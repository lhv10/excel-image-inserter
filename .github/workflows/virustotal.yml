name: VirusTotal Scan

on:
  release:
    types: [ published ]
  workflow_dispatch:

jobs:
  scan:
    name: Scan .bas files
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload ChenAnhHangLoat_VI.bas to VirusTotal
        id: scan_vi
        run: |
          RESPONSE=$(curl -s --request POST \
            --url https://www.virustotal.com/api/v3/files \
            --header "x-apikey: ${{ secrets.VIRUSTOTAL_API_KEY }}" \
            --form "file=@ChenAnhHangLoat_VI.bas")
          ANALYSIS_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['id'])")

          sleep 20

          RESULT=$(curl -s --request GET \
            --url "https://www.virustotal.com/api/v3/analyses/$ANALYSIS_ID" \
            --header "x-apikey: ${{ secrets.VIRUSTOTAL_API_KEY }}")

          HASH=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['meta']['file_info']['sha256'][:7])")
          MALICIOUS=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin)['data']['attributes']['stats']; print(d['malicious'])")
          TOTAL=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin)['data']['attributes']['stats']; print(sum(d.values()))")
          LINK="https://www.virustotal.com/gui/file/$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['meta']['file_info']['sha256'])")"

          echo "hash=$HASH" >> $GITHUB_OUTPUT
          echo "malicious=$MALICIOUS" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "link=$LINK" >> $GITHUB_OUTPUT

      - name: Upload InsertImagesBulk_EN.bas to VirusTotal
        id: scan_en
        run: |
          RESPONSE=$(curl -s --request POST \
            --url https://www.virustotal.com/api/v3/files \
            --header "x-apikey: ${{ secrets.VIRUSTOTAL_API_KEY }}" \
            --form "file=@InsertImagesBulk_EN.bas")
          ANALYSIS_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['id'])")

          sleep 20

          RESULT=$(curl -s --request GET \
            --url "https://www.virustotal.com/api/v3/analyses/$ANALYSIS_ID" \
            --header "x-apikey: ${{ secrets.VIRUSTOTAL_API_KEY }}")

          HASH=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['meta']['file_info']['sha256'][:7])")
          MALICIOUS=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin)['data']['attributes']['stats']; print(d['malicious'])")
          TOTAL=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin)['data']['attributes']['stats']; print(sum(d.values()))")
          LINK="https://www.virustotal.com/gui/file/$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['meta']['file_info']['sha256'])")"

          echo "hash=$HASH" >> $GITHUB_OUTPUT
          echo "malicious=$MALICIOUS" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "link=$LINK" >> $GITHUB_OUTPUT

      - name: Update release notes with VirusTotal table
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref?.replace('refs/tags/', '') || 'v1.1';
            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: tag
            });

            const viTable = `\n\n## 🛡️ VirusTotal Analysis\n\n| File | VirusTotal Status | Detailed Report |\n|------|------------------|------------------|\n| ChenAnhHangLoat_VI.bas | \`${{ steps.scan_vi.outputs.hash }}\` **${{ steps.scan_vi.outputs.malicious }}/${{ steps.scan_vi.outputs.total }}** | [View Report](${{ steps.scan_vi.outputs.link }}) |\n| InsertImagesBulk_EN.bas | \`${{ steps.scan_en.outputs.hash }}\` **${{ steps.scan_en.outputs.malicious }}/${{ steps.scan_en.outputs.total }}** | [View Report](${{ steps.scan_en.outputs.link }}) |\n`;

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              body: release.body + viTable
            });

            console.log('Release notes updated with VirusTotal table!');
