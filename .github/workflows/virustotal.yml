name: VirusTotal Scan

on:
  push:
    branches: [ main ]
    paths:
      - '**.bas'
  release:
    types: [ published ]
  workflow_dispatch:

jobs:
  scan:
    name: Scan .bas files
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Scan ChenAnhHangLoat_VI.bas
        uses: crazy-max/ghaction-virustotal@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          vt_api_key: ${{ secrets.VIRUSTOTAL_API_KEY }}
          files: ChenAnhHangLoat_VI.bas
          update_release_body: true

      - name: Scan InsertImagesBulk_EN.bas
        uses: crazy-max/ghaction-virustotal@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          vt_api_key: ${{ secrets.VIRUSTOTAL_API_KEY }}
          files: InsertImagesBulk_EN.bas
          update_release_body: true
