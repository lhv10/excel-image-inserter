name: VirusTotal Scan

on:
  release:
    types: [ published ]
  workflow_dispatch:

jobs:
  scan:
    name: Scan .bas files
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan ChenAnhHangLoat_VI.bas
        id: scan_vi
        run: |
          RESPONSE=$(curl -s --request POST \
            --url https://www.virustotal.com/api/v3/files \
            --header "x-apikey: ${{ secrets.VIRUSTOTAL_API_KEY }}" \
            --form "file=@ChenAnhHangLoat_VI.bas")

          ANALYSIS_ID=$(echo "$RESPONSE" | python3 -c "
import sys, json
d = json.load(sys.stdin)
if 'data' in d:
    print(d['data']['id'])
else:
    print('ERROR: ' + str(d))
    sys.exit(1)
")
          echo "Analysis ID: $ANALYSIS_ID"

          # Poll until completed (max 10 attempts x 15s = 150s)
          for i in $(seq 1 10); do
            sleep 15
            RESULT=$(curl -s --request GET \
              --url "https://www.virustotal.com/api/v3/analyses/$ANALYSIS_ID" \
              --header "x-apikey: ${{ secrets.VIRUSTOTAL_API_KEY }}")
            STATUS=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['attributes']['status'])" 2>/dev/null)
            echo "Attempt $i - Status: $STATUS"
            if [ "$STATUS" = "completed" ]; then
              break
            fi
          done

          HASH=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['meta']['file_info']['sha256'][:7])")
          MALICIOUS=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['attributes']['stats']['malicious'])")
          SUSPICIOUS=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['attributes']['stats']['suspicious'])")
          TOTAL=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin)['data']['attributes']['stats']; print(sum(d.values()))")
          SHA256=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['meta']['file_info']['sha256'])")
          LINK="https://www.virustotal.com/gui/file/$SHA256"

          if [ "$MALICIOUS" -gt 0 ]; then COLOR="red"
          elif [ "$SUSPICIOUS" -gt 0 ]; then COLOR="yellow"
          else COLOR="brightgreen"; fi

          echo "hash=$HASH" >> $GITHUB_OUTPUT
          echo "malicious=$MALICIOUS" >> $GITHUB_OUTPUT
          echo "suspicious=$SUSPICIOUS" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "link=$LINK" >> $GITHUB_OUTPUT
          echo "color=$COLOR" >> $GITHUB_OUTPUT

      - name: Scan InsertImagesBulk_EN.bas
        id: scan_en
        run: |
          RESPONSE=$(curl -s --request POST \
            --url https://www.virustotal.com/api/v3/files \
            --header "x-apikey: ${{ secrets.VIRUSTOTAL_API_KEY }}" \
            --form "file=@InsertImagesBulk_EN.bas")

          ANALYSIS_ID=$(echo "$RESPONSE" | python3 -c "
import sys, json
d = json.load(sys.stdin)
if 'data' in d:
    print(d['data']['id'])
else:
    print('ERROR: ' + str(d))
    sys.exit(1)
")
          echo "Analysis ID: $ANALYSIS_ID"

          for i in $(seq 1 10); do
            sleep 15
            RESULT=$(curl -s --request GET \
              --url "https://www.virustotal.com/api/v3/analyses/$ANALYSIS_ID" \
              --header "x-apikey: ${{ secrets.VIRUSTOTAL_API_KEY }}")
            STATUS=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['attributes']['status'])" 2>/dev/null)
            echo "Attempt $i - Status: $STATUS"
            if [ "$STATUS" = "completed" ]; then
              break
            fi
          done

          HASH=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['meta']['file_info']['sha256'][:7])")
          MALICIOUS=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['attributes']['stats']['malicious'])")
          SUSPICIOUS=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['attributes']['stats']['suspicious'])")
          TOTAL=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin)['data']['attributes']['stats']; print(sum(d.values()))")
          SHA256=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['meta']['file_info']['sha256'])")
          LINK="https://www.virustotal.com/gui/file/$SHA256"

          if [ "$MALICIOUS" -gt 0 ]; then COLOR="red"
          elif [ "$SUSPICIOUS" -gt 0 ]; then COLOR="yellow"
          else COLOR="brightgreen"; fi

          echo "hash=$HASH" >> $GITHUB_OUTPUT
          echo "malicious=$MALICIOUS" >> $GITHUB_OUTPUT
          echo "suspicious=$SUSPICIOUS" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "link=$LINK" >> $GITHUB_OUTPUT
          echo "color=$COLOR" >> $GITHUB_OUTPUT

      - name: Update release notes with VirusTotal table
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref?.replace('refs/tags/', '') || 'v1.1';
            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: tag
            });

            // shields.io badge with official VirusTotal logo from SimpleIcons
            const mkBadge = (hash, mal, sus, tot, color) =>
              `https://img.shields.io/badge/${hash}%20${mal}%2F${sus}%2F${tot}-${color}?logo=virustotal&logoColor=white`;

            const badgeVI = mkBadge(
              '${{ steps.scan_vi.outputs.hash }}',
              '${{ steps.scan_vi.outputs.malicious }}',
              '${{ steps.scan_vi.outputs.suspicious }}',
              '${{ steps.scan_vi.outputs.total }}',
              '${{ steps.scan_vi.outputs.color }}'
            );
            const badgeEN = mkBadge(
              '${{ steps.scan_en.outputs.hash }}',
              '${{ steps.scan_en.outputs.malicious }}',
              '${{ steps.scan_en.outputs.suspicious }}',
              '${{ steps.scan_en.outputs.total }}',
              '${{ steps.scan_en.outputs.color }}'
            );

            const viTable = [
              '',
              '',
              '## 🛡️ VirusTotal Analysis',
              '',
              '| File | VirusTotal Status | Detailed Report |',
              '|------|:----------------:|-----------------|',
              `| ChenAnhHangLoat_VI.bas | [![VT](${badgeVI})](${{ steps.scan_vi.outputs.link }}) | [View Report](${{ steps.scan_vi.outputs.link }}) |`,
              `| InsertImagesBulk_EN.bas | [![VT](${badgeEN})](${{ steps.scan_en.outputs.link }}) | [View Report](${{ steps.scan_en.outputs.link }}) |`,
            ].join('\n');

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              body: release.body + viTable
            });
            console.log('Done! VirusTotal table added.');
